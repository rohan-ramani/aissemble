suite: quarkus
templates:
  - deployment.yaml
tests:
  - it: Should contain correct default values
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: aissemble-quarkus-chart
      - equal:
          path: spec.template.spec.automountServiceAccountToken
          value: false
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: ghcr.io/boozallen/aissemble-quarkus
      - contains:
          path: spec.template.spec.volumes
          content:
            name: quarkus-application-properties
          any: true
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: quarkus-application-properties
            subPath: quarkus-properties-file
          any: true
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: IfNotPresent
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: quarkus-application-properties
          any: true
      - contains:
          path: spec.template.spec.volumes
          content:
            name: quarkus-application-properties
          any: true
      - notExists:
          path: spec.template.spec.containers[0].resources
  - it: Should set values appropriately
    set:
      deployment:
        securityContext:
          runAsUser: 50000
          runAsGroup: 0
          fsGroup: 0
        supplementalVolumes:
          - name: some-extra-file
            configMap:
              name: supplemental-quarkus-config
              items:
                - key: quarkus-properties-file
                  path: quarkus-properties-file
        supplementalVolumeMounts:
          - name: some-extra-file
            mountPath: /deployments/config/anotherfile.properties
            subPath: some-extra-file
        startupProbe:
          httpGet:
            path: /path/health
            port: http
          failureThreshold: 60
          periodSeconds: 2
      app:
        name: project-quarkus
      togglableConfiguration:
        toggle: false
        volumes:
          - name: test-toggleable-volume
        volumeMounts:
          - name: test-toggleable-volume
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 50000
      - equal:
          path: spec.template.spec.securityContext.runAsGroup
          value: 0
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 0
      - notEqual:
          path: metadata.name
          value: aissemble-quarkus-chart
      - equal:
          path: metadata.name
          value: project-quarkus
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: some-extra-file
          any: true
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: quarkus-application-properties
          any: true
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: test-togglable-volume
      - contains:
          path: spec.template.spec.volumes
          content:
            name: some-extra-file
          any: true
      - contains:
          path: spec.template.spec.volumes
          content:
            name: quarkus-application-properties
          any: true
      - notContains:
          path: spec.template.spec.volumes
          content:
            name: test-togglable-volume
      - equal:
          path: spec.template.spec.containers[0].startupProbe.failureThreshold
          value: 60
      - equal:
          path: spec.template.spec.containers[0].startupProbe.periodSeconds
          value: 2
      - equal:
          path: spec.template.spec.containers[0].startupProbe.httpGet.path
          value: /path/health
      - equal:
          path: spec.template.spec.containers[0].startupProbe.httpGet.port
          value: http
  - it: When specifying container resources requests and limits, appropriate requests and limits are configured
    set:
      deployment:
        resources:
          requests:
            memory: 300Mi
            cpu: 100m
          limits:
            memory: 500Mi
            cpu: 200m
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 300Mi
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 100m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 500Mi
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 200m
  - it: Security Context can be specified for the container
    set:
      deployment:
        securityContext:
          runAsUser: 50000
        containerSecurityContext:
          runAsUser: 1001
          allowPrivilegedEscalation: false
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 50000
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 1001
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegedEscalation
          value: false
