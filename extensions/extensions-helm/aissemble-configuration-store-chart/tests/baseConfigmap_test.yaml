suite: quarkus
templates:
  - baseConfigmap.yaml
tests:
  - it: Should contain correct default values
    asserts:
      - isKind:
          of: ConfigMap

  - it: Should override default properties appropriately when enabled
    set:
      configMapProperties:
        enabled: true
        name: configuration-store-config
        baseConfigFiles:
          spark.properties: |-
            test.username=test
            test.password=test
        envConfigFiles:
          spark.properties: |-
    asserts:
      - equal:
          path: data
          value:
            spark.properties: |-
              test.username=test
              test.password=test

  - it: Should not generate configMap when disabled
    set:
      configMapProperties:
        enabled: false
        name: configuration-store-config
        baseConfigFiles:
          spark.properties: |-
            test.username=test
            test.password=test
        envConfigFiles:
          spark.properties: |-
    asserts:
      - notExists:
          path: data