suite: infrastructure
templates:
  - namespaces.yaml
tests:
  - it: Should contain a Jenkins Namespace
    documentIndex: 0
    asserts:
      - containsDocument:
          kind: Namespace
          apiVersion: v1
          name: jenkins
  - it: Should contain a Ingress Nginx namespace
    documentIndex: 1
    asserts:
      - containsDocument:
          kind: Namespace
          apiVersion: v1
          name: ingress-nginx
  - it: Should be 2 namespaces in total by default
    asserts:
      - hasDocuments:
          count: 2
  - it: Only contains a ArgoCD Namespace when enabled
    set:
      argo-cd:
        enabled: true
    documentIndex: 0
    asserts:
      - containsDocument:
          kind: Namespace
          apiVersion: v1
          name: argocd
      - hasDocuments:
          count: 3
  - it: Does not produce namespaces if options are disabled
    set:
      argo-cd:
        enabled: false
      jenkins:
        enabled: false
      ingress-nginx:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0
  - it: Does not produce namespaces if overrides are disabled
    set:
      argo-cd:
        namespaceOverride: ""
      jenkins:
        namespaceOverride: ""
      ingress-nginx:
        namespaceOverride: ""
    asserts:
      - hasDocuments:
          count: 0
  - it: Does not produce namespaces if overrides match the release namespace
    release:
      namespace: test
    set:
      argo-cd:
        namespaceOverride: test
      jenkins:
        namespaceOverride: test
      ingress-nginx:
        namespaceOverride: test
    asserts:
      - hasDocuments:
          count: 0