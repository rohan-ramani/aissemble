###
# Most of the other Quarkus apps use the Quarkus chart at the Helm level to set messaging properties, but Metadata does
# not currently, and so relies on the properties set in src/main/resources/application.properties. This works fine during
# deployment when Kafka will be deployed via the kafka Helm chart, but does not work for this test. So restore the default
# value from Quarkus, which uses a local kafka server.
kafka.bootstrap.servers=localhost:9092
