apiVersion: v1
kind: ServiceAccount
metadata:
  namespace: gh-actions-aissemble
  name: arc-runner-set-aissemble-gha-rs-custom-permissions
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: arc-runner-set-aissemble-gha-rs-custom-permissions
  namespace: gh-actions-aissemble
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: arc-runner-set-aissemble-gha-rs-custom-permissions
subjects:
- kind: ServiceAccount
  namespace: gh-actions-aissemble
  name: arc-runner-set-aissemble-gha-rs-custom-permissions
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: gh-actions-aissemble
  name: arc-runner-set-aissemble-gha-rs-custom-permissions
rules:
- apiGroups:
  - ""
  resources:
  - pods
  - pods/exec
  verbs:
  - get
  - list
  - create
  - delete
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - get
  - list
  - create
  - delete
