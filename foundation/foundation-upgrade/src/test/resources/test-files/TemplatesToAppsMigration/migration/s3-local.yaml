{{- if .Values.s3LocalEnabled -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: s3-local
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: test-654
    server: {{ .Values.spec.destination.server }}
  project: default
  source:
    path: test-654-deploy/src/main/resources/apps/s3-local
    repoURL: {{ .Values.spec.repo }}
    targetRevision: {{ .Values.spec.targetRevision }}
    {{ if .Values.spec.helm.valueFiles }}
    helm:
      valueFiles:
        {{- range .Values.spec.helm.valueFiles }}
        - {{ . }}
        {{- end }}
    {{ end }}
  {{- with .Values.spec.syncPolicy }}
  syncPolicy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end -}}