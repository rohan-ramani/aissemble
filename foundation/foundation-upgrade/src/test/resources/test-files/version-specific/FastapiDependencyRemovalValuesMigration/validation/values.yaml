########################################
## CONFIG | Versioning Configs
########################################

# Versioning
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
aissemble-versioning-chart:
  app:
    name: test-name
  image:
    name: test-image-name
    dockerRepo: docker-registry-placeholder/repository/
    tag: latest
  service:
    spec:
      ports:
        - name: http
          port: 8080
          targetPort: 80
  deployment:
    ports:
      - name: http-1
        containerPort: 80
        protocol: TCP
    restartPolicy: Always
  testkey:
    ports:
      - name: http-1
        containerPort: 80
        protocol: TCP
    restartPolicy: Always